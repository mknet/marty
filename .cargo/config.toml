# Cross-compile workspace members for Linux + musl (ELF, typically statically linked libc).
#
# Prerequisites:
#   rustup target add x86_64-unknown-linux-musl
#   cargo install cargo-zigbuild
#   # Zig must be on PATH (cargo-zigbuild invokes it), e.g. macOS: brew install zig
#
# Examples:
#   cargo zigbuild -p marty-01-basic --release --target x86_64-unknown-linux-musl
#   cargo zigbuild -p marty-02-routing --release --target x86_64-unknown-linux-musl
#
# aarch64:
#   rustup target add aarch64-unknown-linux-musl
#   cargo zigbuild -p marty-01-basic --release --target aarch64-unknown-linux-musl
#
# On a Linux (glibc) host you can instead try plain Cargo after installing a musl GCC
# (e.g. Debian/Ubuntu: musl-tools) and setting `linker = "x86_64-linux-musl-gcc"` in a
# target table here if the default build fails.

[alias]
linux-musl-01-basic = "zigbuild -p marty-01-basic --release --target x86_64-unknown-linux-musl"
linux-musl-01-basic-aarch64 = "zigbuild -p marty-01-basic --release --target aarch64-unknown-linux-musl"
linux-musl-02-routing = "zigbuild -p marty-02-routing --release --target x86_64-unknown-linux-musl"
linux-musl-02-routing-aarch64 = "zigbuild -p marty-02-routing --release --target aarch64-unknown-linux-musl"
